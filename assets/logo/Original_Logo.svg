  <title
     id="title1">AddOn icon, bigger plus, steeper upper wedge, brown corners</title>
  <desc
     id="desc1">A large green plus in the top-left on a dark brown corner with a steeper lower edge, an orange hold with a green ring centered on the cream wedge, and a serif green n in the bottom-right on brown, each with a white offset shadow.</desc>
